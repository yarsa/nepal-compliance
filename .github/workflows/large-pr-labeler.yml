name: Label Large PR

on:
  workflow_run:
    workflows: ["PR Size Check"]
    types: [completed]

jobs:
  label-large-pr:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      actions: read
      issues: write
      pull-requests: write

    steps:
      - name: Download size result
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pr-size
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Ensure "large-pr" label exists
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const labelName = 'large-pr';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
              });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: 'BC5834',
                  description: 'Pull request with over 300 LOC changed.',
                });
              } else {
                throw error;
              }
            }

      - name: Apply or remove label
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const { prNumber, isLarge } = JSON.parse(fs.readFileSync('pr-size.json', 'utf8'));

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (isLarge) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ['large-pr'],
              });
              console.log('Label "large-pr" added.');
            } else {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name: 'large-pr',
                });
                console.log('Label "large-pr" removed.');
              } catch (error) {
                if (error.status !== 404) throw error;
                console.log('"large-pr" label not present');
              }
            }
