name: PR Size Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-size:
    runs-on: ubuntu-slim

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Calculate PR size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const totalChanges = files.reduce((sum, file) => {
              return sum + file.additions + file.deletions;
            }, 0);

            const isLarge = totalChanges > 300;
            const prNumber = context.payload.pull_request.number;

            const fs = require('fs');
            fs.writeFileSync('pr-size.json', JSON.stringify({ prNumber, isLarge }));
            console.log(`PR #${prNumber}: ${totalChanges} lines changed, isLarge=${isLarge}`);

      - name: Upload size result
        uses: actions/upload-artifact@v4
        with:
          name: pr-size
          path: pr-size.json
