name: Build and Push Docker Image
on:
  release:
    types: [published]
  push:
    branches:
      - ci/custom-image-tags
      - develop
    paths-ignore:
      - '**/*.md'

env:
  TZ: /usr/share/zoneinfo/Asia/Kathmandu
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 1
  REGISTRY: docker.io
  IMAGE_NAME: dockmyapp0/nepal-compliance

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: amd64
            os: ubuntu-24.04
            platform: linux/amd64
          - name: arm64
            os: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.os }}
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      metadata: ${{ steps.meta.outputs.json }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Generate image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # For releases: use the tag name (e.g., v0.1.3)
            TAG="${{ github.event.release.tag_name }}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "ci/custom-image-tags" ]; then
            # For master branch: use latest
            echo "tag=latest" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            # For develop branch: use develop
            echo "tag=develop" >> $GITHUB_OUTPUT
          else
            # Fallback for other branches (shouldn't happen with current triggers)
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT  
          fi

      - name: Set APPS_JSON based on branch
        run: |
          if [ "${{ github.ref_name }}" = "develop" ]; then
            echo "APPS_JSON_RAW<<EOF" >> $GITHUB_ENV
            echo '${{ vars.APPS_JSON_DEVELOP }}' >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "APPS_JSON_RAW<<EOF" >> $GITHUB_ENV
            echo '${{ vars.APPS_JSON }}' >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Encode APPS_JSON to base64
        run: |
          echo "APPS_JSON_BASE64=$(echo '${{ env.APPS_JSON_RAW }}' | base64 -w 0)" >> $GITHUB_ENV

      - name: Clone frappe_docker
        run: git clone --depth=1 https://github.com/frappe/frappe_docker

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: ./frappe_docker
          platforms: ${{ matrix.platform }}
          file: frappe_docker/images/custom/Containerfile
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-15
            PYTHON_VERSION=3.11.9
            NODE_VERSION=18.20.2
            APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}

      - name: Export digest
        id: digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
          echo "digest=${digest}" >> $GITHUB_OUTPUT

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.tag }} \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.tag }}